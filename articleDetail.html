<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>文章详情</title>
  <link rel="stylesheet" href="./icofont1/iconfont.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #F7F7F7;
      padding: 10px;
    }

    .detail-header {
      display: flex;
      align-items: center;
      padding: 10px 0;
    }

    .detail-header i {
      font-size: 24px;
      margin-right: 15px;
    }

    .detail-title {
      font-size: 20px;
      font-weight: bold;
      margin: 15px 0;
    }

    .detail-author {
      display: flex;
      align-items: center;
      margin-bottom: 15px;
    }

    .detail-author img {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      margin-right: 10px;
    }

    .detail-content {
      background: #fff;
      padding: 15px;
      border-radius: 8px;
      line-height: 1.8;
    }
  </style>
</head>

<body>
  <!-- ====================== 评论区域（仅查看） ====================== -->
  <div style="margin-top:30px;">
    <h3 style="font-size:16px; margin-bottom:10px;">评论列表</h3>
    <div id="commentList"></div>
    <div id="loadMore" style="text-align:center; padding:10px; color:#999;"></div>
  </div>
  <div class="detail-header">
    <i class="iconfont icon-xiangzuo1" onclick="history.back()"></i>
    <h1>文章详情</h1>
  </div>

  <div class="detail-title" id="detail-title"></div>

  <div class="detail-author">
    <img id="detail-avatar" src="./img/touxiang.jpg" alt="">
    <div>
      <p id="detail-username">未知用户</p>
      <p id="detail-time">发布时间</p>
    </div>
  </div>

  <div class="detail-content" id="detail-content">加载中...</div>

  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <script>
    axios.defaults.baseURL = 'http://8.138.150.235:8585/cat';

    // 1. 从 URL 里获取文章ID
    const params = new URLSearchParams(location.search);
    const articleId = params.get("id");

    if (!articleId) {
      alert("文章ID无效");
      history.back();
    }

    // 2. 请求文章详情接口
    axios.get("/article/detail", {
      params: { id: articleId }
    }).then(res => {
      const article = res.data.data;
      console.log("文章详情：", article);
      console.log(res);

      // 3. 渲染到页面
      document.getElementById("detail-title").innerText = article.title || "无标题";
      document.getElementById("detail-avatar").src = article.userInfo?.avatar || "./img/touxiang.jpg";
      document.getElementById("detail-username").innerText = article.userInfo?.username || "未知用户";
      document.getElementById("detail-time").innerText = article.createTime || "";
      document.getElementById("detail-content").innerText = article.content || "暂无内容";
    }).catch(err => {
      console.error("获取文章详情失败：", err);
      document.getElementById("detail-content").innerText = "加载失败，请稍后重试";
    });
    // ====================== 加载文章评论（仅查看） ======================
    let page = 1;
    const pageSize = 10;
    let loading = false;
    let noMore = false;

    // 加载评论
    function loadComments() {
      if (loading || noMore) return;
      loading = true;

      axios.get('/comment/first', {
        params: {
          articleId: articleId, // 你页面已有的文章ID
          page: page,
          pageSize: pageSize
        }
      }).then(res => {
        const list = res.data.data.records || [];
        const total = res.data.data.pages || 0;
        console.log("评论信息:", res);

        if (list.length === 0) {
          document.getElementById('commentList').innerHTML = '<p style="text-align:center;">暂无评论</p>';
          loading = false;
          noMore = true;
          return;
        }

        let html = '';
        list.forEach(item => {
          html += `
        <div style="padding:10px; border-bottom:1px solid #eee;">
          <div style="display:flex; align-items:center;">
            <img src="${item.userInfo?.avatar || './img/touxiang.jpg'}" style="width:30px; height:30px; border-radius:50%; margin-right:8px;">
            <span>${item.userInfo?.username || '匿名用户'}</span>
          </div>
          <p style="margin-top:5px; font-size:14px;">${item.content}</p>
        </div>
      `;
        });

        document.getElementById('commentList').innerHTML += html;
        page++;

        if (page > total) {
          noMore = true;
          document.getElementById('loadMore').innerText = '没有更多了';
        }

        loading = false;
      });
    }

    // 首次加载评论
    loadComments();

    // 下滑加载更多
    window.addEventListener('scroll', () => {
      const scrollTop = document.documentElement.scrollTop || document.body.scrollTop;
      const scrollHeight = document.documentElement.scrollHeight;
      const clientHeight = document.documentElement.clientHeight;

      if (scrollTop + clientHeight >= scrollHeight - 200 && !noMore) {
        loadComments();
      }
    });
  </script>
</body>

</html>
