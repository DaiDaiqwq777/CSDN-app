<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>

<body>
  搜索框
  <input type="text" id="key" placeholder="搜索文章">
  <button onclick="search()">搜索</button>

  <!-- 文章列表 -->
  <div id="list"></div>

  <!-- 分页 -->
  <div>
    <button onclick="prevPage()">上一页</button>
    <span id="pageInfo"></span>
    <button onclick="nextPage()">下一页</button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <script>
    axios.defaults.baseURL = 'http://8.138.150.235:8585/cat';
    // 分页
    let page = 1
    let size = 10
    let keyword = ""

    // 搜索
    function search() {
      keyword = document.getElementById("key").value
      page = 1
      getList()
    }

    // 获取文章列表
    function getList() {
      axios({
        url: "/article/search",
        method: "get",
        params: {
          key: keyword,
          page: page,
          pageSize: size
        }
      }).then(res => {
        const data = res.data.data
        const list = data.records || []

        let html = ""
        list.forEach(item => {
          // 你要求的所有字段
          const title = item.title
          const content = item.content
          const summary = item.summary
          const avatar = item.userInfo?.avatar || 'https://p3-flow-imagex-sign.byteimg.com/tos-cn-i-a9rns2rl98/1d2912630f52479cbce42a3a3f0a67cd.png'
          const username = item.userInfo?.username || '未知作者'
          const createTime = item.createTime
          const likeNum = item.likeNum || 0
          const commentNum = item.commentNum || 0
          const viewNum = item.viewNum || 0

          html += `
<div style="padding:15px; border-bottom:1px solid #eee; border-radius:10px; margin-bottom:10px; background:#fff;">
  <div style="display:flex; align-items:center; margin-bottom:10px;">
    <img src="${avatar}" style="width:40px; height:40px; border-radius:50%; margin-right:10px; object-fit:cover;">
    <span style="font-size:15px; font-weight:bold;">${username}</span>
  </div>

  <h3 style="margin:0 0 8px 0; font-size:17px; color:#333;">${title}</h3>
  <p style="margin:0 0 10px 0; color:#666; font-size:14px; line-height:1.5;">${summary}</p>

  <div style="font-size:12px; color:#999; display:flex; gap:12px;">
    <span>📅 ${createTime}</span>
    <span>👀 ${viewNum} 阅读</span>
    <span>💬 ${commentNum} 评论</span>
    <span>👍 ${likeNum} 点赞</span>
  </div>
</div>
        `
        })

        document.getElementById("list").innerHTML = html
        document.getElementById("pageInfo").innerText = `第 ${page} 页 / 共 ${data.pages} 页`
      })
    }

    // 上一页
    function prevPage() {
      if (page > 1) {
        page--
        getList()
      }
    }

    // 下一页
    function nextPage() {
      page++
      getList()
    }
  </script>
</body>

</html>
