<body>
  <div class="home ">

  </div>
  <div class="footer">

      <span><i class="iconfont icon-shouye"></i></span>

  <div class="publish-article slide-panel">

      <div class="publish-article-type">

          <div class="type1-left">
            <p>写篇文章<i class="iconfont icon-xiangyou1"></i></p>

          </div>

        <div class="type2">

        <div class="publish-footer-item">

        <div class="publish-footer-item">
          <div><i class="iconfont icon-tiwenti"></i></div>
          <p>提问题</p>
        </div>
        <div class="publish-footer-item">

</body>

<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
<script>
  // ==========================
  // ✅ 防抖 + 节流 工具函数
  // ==========================
  function debounce(func, delay = 300) {
    let timer = null;
    return function (...args) {
      if (timer) clearTimeout(timer);
      timer = setTimeout(() => {
        func.apply(this, args);
      }, delay);
    };
  }

  function throttle(func, delay = 500) {
    let lastTime = 0;
    return function (...args) {
      const now = Date.now();
      if (now - lastTime >= delay) {
        lastTime = now;
        func.apply(this, args);
      }
    };
  }

  // ==========================
  // ✅ 全局登录校验函数（核心）
  // ==========================
  function checkLogin() {
    const token = localStorage.getItem("token");
    if (!token) {
      alert("请先登录");
      location.href = "login.html";
      return false;
    }
    return true;
  }

  // ==========================
  // 页面滑动跳转（修复版）
  // ==========================
  function goToPage(currentPage, nextPage) {
    nextPage.style.transform = 'translateX(100%)';
    nextPage.style.zIndex = '10';
    nextPage.classList.remove('active-dismiss');
    void nextPage.offsetWidth;
    currentPage.style.transform = 'translateX(-100%)';
    nextPage.style.transform = 'translateX(0)';
  }

  function backToPage(currentPage, prevPage) {
    prevPage.style.zIndex = '10';
    currentPage.style.zIndex = '5';
    currentPage.style.transform = 'translateX(100%)';
    prevPage.style.transform = 'translateX(0)';
  }

  // ==========================
  // 路由跳转
  // ==========================
  // 主页 → 搜索页
  document.querySelector(".home-search-left").addEventListener("click", function () {
    if (!checkLogin()) return;
    const homePage = document.querySelector(".homepage");
    const searchInterfacePage = document.querySelector(".search-interface");
    const footer = document.querySelector(".footer");
    footer.style.display = 'none';
    goToPage(homePage, searchInterfacePage);
  })

  // 搜索页 → 主页
  document.querySelector(".search-interface .header-left i").addEventListener("click", function () {
    const homePage = document.querySelector(".homepage");
    const searchInterfacePage = document.querySelector(".search-interface");
    const footer = document.querySelector(".footer");
    backToPage(searchInterfacePage, homePage);
    footer.style.display = 'flex';
  })

  // 搜索页 → 结果页
  document.querySelector(".search-interface .header-right").addEventListener("click", function () {
    const key = document.querySelector("#key2").value.trim();

    if (!key) {
      alert("请输入搜索内容");
      return;
    }

    const searchInterfacePage = document.querySelector(".search-interface");
    const searchContentPage = document.querySelector(".search-content");
    const footer = document.querySelector(".footer");

    footer.style.display = 'none';
    goToPage(searchInterfacePage, searchContentPage);
    document.querySelector("#search-content-key").value = key;

    setTimeout(() => {
      startSearch(key);
    }, 300);
    document.querySelector("#key2").value = "";
  });

  // 结果页 → 搜索页
  document.querySelector(".search-content .header-left i").addEventListener("click", function () {
    const searchContentPage = document.querySelector(".search-content");
    const searchInterfacePage = document.querySelector(".search-interface");
    backToPage(searchContentPage, searchInterfacePage);
  })

  // ==========================
  // 首页随机文章
  // ==========================
  axios.defaults.baseURL = 'http://8.138.150.235:8585/cat';

  window.onload = function () {
    getRandomArticles();
  };

  function shuffle(arr) {
    let newArr = [...arr];
    for (let i = newArr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [newArr[i], newArr[j]] = [newArr[j], newArr[i]];
    }
    return newArr;
  }

  function getRandomArticles() {
    axios.get("/article/search", {
      params: { key: "", page: 1, pageSize: 20 }
    }).then(res => {
      const list = res.data.data.records || [];
      const randomList = shuffle(list);
      const box = document.querySelector(".home-article-list");
      box.innerHTML = "";
      randomList.forEach(item => {
        box.innerHTML += `
        <div class="home-article-item" data-id="${item.id}">
          <div class="title"><p>${item.title || "无标题"}</p></div>
          <div class="actor">
            <img src="${item.userInfo?.avatar || './img/touxiang.jpg'}" alt="">
            <p>${item.userInfo?.username || "未知用户"}</p>
          </div>
          <div class="content"><p>${item.content || "暂无简介"}</p></div>
          <div class="information">
            <p>${item.viewed || 0}阅读</p><p>0评论</p><p>${item.liked || 0}点赞</p><p>${item.createTime || ""}</p>
          </div>
        </div>`;
      });
    });
  }

  document.querySelector(".home-article-list").addEventListener("click", function (e) {
    if (!checkLogin()) return;
    const articleItem = e.target.closest(".home-article-item");
    if (!articleItem) return;
    const articleId = articleItem.dataset.id;
    location.href = `article.html?id=${articleId}`;
  });

  document.querySelector(".searcharticle-result-list").addEventListener("click", function (e) {
    if (!checkLogin()) return;
    const articleItem = e.target.closest(".searcharticle-result-list-item");
    if (!articleItem) return;
    const articleId = articleItem.dataset.id;
    location.href = `article.html?id=${articleId}`;
  });

  // ==========================
  // 搜索页逻辑（文章+用户）
  // ==========================
  document.querySelector(".footer div:last-child").addEventListener("click", function () {
    location.href = "user.html";
  })

  let typenum = 1;
  let currentPage = 1;
  const pageSize = 10;
  let keyword = "";
  let isLoading = false;
  let noMore = false;

  document.querySelector(".search-content .nav ul li:first-child").addEventListener("click", function (e) {
    const userLi = document.querySelector(".search-content .nav ul li:nth-child(5)");
    document.querySelector(".searcharticle-result-list").classList.remove("content-unchoose");
    document.querySelector(".searchuser-result-list").classList.add("content-unchoose");
    e.target.classList.add("nav-choose");
    userLi.classList.remove("nav-choose");
    typenum = 1; currentPage = 1; noMore = false;
    const key = document.querySelector("#search-content-key").value.trim();
    if (key) startSearch(key);
  });

  document.querySelector(".search-content .nav ul li:nth-child(5)").addEventListener("click", function (e) {
    const allLi = document.querySelector(".search-content .nav ul li:first-child");
    document.querySelector(".searcharticle-result-list").classList.add("content-unchoose");
    document.querySelector(".searchuser-result-list").classList.remove("content-unchoose");
    e.target.classList.add("nav-choose");
    allLi.classList.remove("nav-choose");
    typenum = 5; currentPage = 1; noMore = false;
    const key = document.querySelector("#search-content-key").value.trim();
    if (key) startSearch(key);
  });

  document.querySelector(".search-content .header-right p").addEventListener("click", startSearch);

  // 搜索输入框 防抖
  document.querySelector("#search-content-key").addEventListener("keyup", debounce((e) => {
    if (e.key === "Enter") startSearch();
  }, 300));

  function startSearch(key) {
    keyword = document.querySelector("#search-content-key").value.trim();
    if (!keyword) { alert("请输入搜索内容"); return; }
    currentPage = 1; noMore = false;
    if (typenum === 1) {
      document.querySelector(".searcharticle-result-list").innerHTML = "";
    } else {
      document.querySelector(".searchuser-result-list").innerHTML = "";
    }
    loadData();
  }

  function loadData() {
    if (isLoading || noMore) return;
    isLoading = true;
    let box = typenum === 1 ? document.querySelector(".searcharticle-result-list") : document.querySelector(".searchuser-result-list");
    box.innerHTML += `<div class="loading" style="text-align:center;padding:15px;color:#999;">加载中...</div>`;

    setTimeout(() => {
      let url = typenum === 1 ? "/article/search" : "/user/search";
      axios({
        method: "GET", url, params: { key: keyword, page: currentPage, pageSize: pageSize }
      }).then(res => {
        document.querySelector(".loading")?.remove();
        const list = res.data.data.records || [];

        if (list.length === 0 && currentPage === 1) {
          box.innerHTML = `<p style="padding:30px;text-align:center;">暂无搜索结果</p>`;
          isLoading = false; noMore = true; return;
        }

        if (typenum === 1) {
          list.forEach(item => {
            box.innerHTML += `
            <div class="searcharticle-result-list-item" data-id="${item.id}">
              <div class="title"><p>${item.title || "无标题"}</p></div>
              <div class="actor">
                <img src="${item.userInfo?.avatar || './img/touxiang.jpg'}" alt="">
                <p>${item.userInfo?.username || "未知用户"}</p>
              </div>
              <div class="content"><p>${item.content || "暂无简介"}</p></div>
              <div class="information">
                <p>${item.viewed || 0}阅读</p><p>0评论</p><p>${item.liked || 0}点赞</p><p>${item.createTime || ""}</p>
              </div>
            </div>`;
          })
        } else {
          list.forEach(item => {
            box.innerHTML += `
            <div class="searchuser-result-list-item" data-userid="${item.id}">
              <div class="searchuser-result-list-item-left">
                <img src="${item.avatar || './img/touxiang.jpg'}" alt="">
              </div>
              <div class="searchuser-result-list-center">
                <p>${item.username || "未知用户"}</p>
                <p data-fans="${item.fans || 0}">粉丝: ${item.fans || 0}</p>
              </div>
              <div class="searchuser-result-list-item-right">
                <button class="follow-btn" data-userid="${item.id}">加载中...</button>
              </div>
            </div>`;
          });

          const token = localStorage.getItem("token") || "";
          list.forEach(item => {
            const userId = item.id;
            axios.get("/user/isFollow", {
              params: { userId: userId },
              headers: { token: token }
            }).then(res => {
              const isFollowed = res.data.data;
              const btn = document.querySelector(`.follow-btn[data-userid="${userId}"]`);
              if (!btn) return;
              btn.dataset.isfollow = isFollowed;

              if (isFollowed) {
                btn.innerText = "已关注";
                btn.style.background = "#ccc";
                btn.style.color = "#666";
              } else {
                btn.innerText = "关注";
                btn.style.background = "#007bff";
                btn.style.color = "#fff";
              }
            }).catch(() => {
              const btn = document.querySelector(`.follow-btn[data-userid="${userId}"]`);
              if (btn) {
                btn.innerText = "关注";
                btn.style.background = "#007bff";
                btn.style.color = "#fff";
              }
            });
          });
        }

        if (list.length < pageSize) {
          noMore = true;
          box.innerHTML += `<p style="text-align:center;padding:20px;">没有更多了</p>`;
        }
        currentPage++;
        isLoading = false;
      }).catch(() => {
        document.querySelector(".loading")?.remove();
        isLoading = false;
      });
    }, 500);
  }

  // 滚动加载 节流
  document.querySelector('.search-content').addEventListener('scroll', throttle(function () {
    const st = this.scrollTop;
    const sh = this.scrollHeight;
    const ch = this.clientHeight;
    if (st + ch >= sh - 200 && !isLoading && !noMore) {
      loadData();
    }
  }, 500));

  // ------------------------------
  // 登录状态校验
  // ------------------------------
  function checkLoginStatus() {
    const token = localStorage.getItem("token");
    if (!token) {
      alert("登录状态已过期，请重新登录");
      location.href = "login.html";
      return;
    }
    axios.get("/user/isLogin", { headers: { token: token } }).then(res => {
      if (res.data.code === 200 && !res.data.data) {
        localStorage.removeItem("token");
        alert("登录过期");
        location.href = "login.html";
      }
    });
  }
  setTimeout(checkLoginStatus, 10000);

  // ------------------------------
  // 发布文章
  // ------------------------------
  document.querySelector(".publish-icon").addEventListener("click", function () {
    if (!checkLogin()) return;
    document.querySelector(".slide-panel").classList.add("show");
    const avatarUrl = localStorage.getItem("avatarsrc");
    const avatarImg = document.querySelector(".publish-avator-img");
    avatarImg.src = avatarUrl && avatarUrl !== "null" ? avatarUrl : "./img/touxiang.jpg";
    const username = localStorage.getItem("username");
    document.querySelector("#publish-username").innerText = username || "未知用户";
  });

  document.querySelector(".close-icon").addEventListener("click", function () {
    document.querySelector(".publish-article").classList.remove("show");
  });
  document.querySelector(".publish-article-type-top").addEventListener("click", function () {
    document.querySelector(".publish-article").classList.remove("show");
  });
  document.querySelector(".type1-left").addEventListener("click", function () {
    window.location.href = "articlepublishl.html";
  });

  // ==========================
  // ✅ 关注/取消关注（节流防重复点击）
  // ==========================
  document.querySelector('.searchuser-result-list').addEventListener('click', throttle(function (e) {
    const btn = e.target.closest('.follow-btn');
    if (!btn) return;
    const token = localStorage.getItem('token');
    if (!token) { alert('请先登录'); return; }

    const userItem = btn.closest('.searchuser-result-list-item');
    const userId = btn.dataset.userid;
    let isFollowed = btn.dataset.isfollow === 'true';
    const fansEl = userItem.querySelector('[data-fans]');
    let currentFans = parseInt(fansEl.dataset.fans || 0);

    if (btn.classList.contains('loading')) return;
    btn.classList.add('loading');

    axios.post('/user/follow', null, {
      params: { userId: userId },
      headers: { token: token }
    }).then(res => {
      if (res.data.code === 200) {
        isFollowed = !isFollowed;
        btn.dataset.isfollow = isFollowed;

        if (isFollowed) {
          currentFans += 1;
          btn.innerText = '已关注';
          btn.style.background = '#ccc';
          btn.style.color = '#666';
        } else {
          currentFans -= 1;
          btn.innerText = '关注';
          btn.style.background = '#007bff';
          btn.style.color = '#fff';
        }

        fansEl.innerText = `粉丝: ${currentFans}`;
        fansEl.dataset.fans = currentFans;
      } else {
        alert('操作失败：' + (res.data.msg || '未知错误'));
      }
    }).catch(() => {
      alert('关注请求失败');
    }).finally(() => {
      btn.classList.remove('loading');
    });
  }, 800));
</script>


</body>

</html>
